{% extends "base.html" %}

{% block content %}
<div class="clay-card auth-form">
    <div class="iso-flair" style="top: -20px; left: -20px; background: var(--secondary);"></div>
    <h2>Reset Password ❄️</h2>
    <p class="text-light handwritten">Happens to the best of us! Enter your email to get a code.</p>
    
    <form method="POST">
        <input type="email" name="email" class="clay-input" placeholder="Your account email" required style="margin-bottom: 20px;">
        
        <button type="submit" class="clay-button primary" style="width: 100%;">Send Code</button>
    </form>
    
    <p style="margin-top: 20px;">
        Remembered it? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: bold;">Go back to Login</a>
    </p>
</div>
{% endblock %}
