{% extends "base.html" %}

{% block content %}
<div class="clay-card auth-form">
    <div class="iso-flair" style="top: -20px; left: -20px;"></div>
    <h2>Welcome Back  👋</h2>
    <p class="text-light handwritten">Log in to track your resolutions!</p>
    
    <div class="auth-tabs" style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
        <a href="{{ url_for('login') }}" style="flex: 1; text-align: center; font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; text-decoration: none;">Login</a>
        <a href="{{ url_for('register') }}" style="flex: 1; text-align: center; color: var(--text-light); text-decoration: none; padding-bottom: 5px;">Sign Up</a>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
        <input type="email" name="email" class="clay-input" placeholder="Email Address" required style="margin-bottom: 15px;">
        <input type="password" name="password" class="clay-input" placeholder="Password" required style="margin-bottom: 5px;">
        
        <div style="text-align: right; margin-bottom: 15px;">
            <a href="{{ url_for('forgot_password') }}" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
        </div>
        
        <button type="submit" class="clay-button primary" style="width: 100%; margin-top: 10px;">Login Account</button>
    </form>
    
    <p style="margin-top: 20px; font-size: 0.9rem;">
        New to GlacierGoals? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: bold;">Create an account</a>
    </p>
</div>
{% endblock %}
