name: Build and Release Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Debug Environment
        run: |
          ls -R android
          java -version
          node -v

      - name: Build APK
        run: |
          cd android
          # Use Environment variables for passwords
          export BUBBLEWRAP_KEYSTORE_PASSWORD="glacier2026"
          export BUBBLEWRAP_KEY_PASSWORD="glacier2026"
          bubblewrap build --yes

      - name: Create Release
        id: create_release
        uses: actions/github-script@v6
        with:
          script: |
            try {
              const run_num = context.runNumber;
              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v1.0.${run_num}`,
                name: `GlacierGoals Android v1.0.${run_num}`,
                body: 'Automatic build of the GlacierGoals Android App.',
                draft: false,
                prerelease: false
              });
              return release.id;
            } catch (e) {
              console.log("Release creation error", e);
              // Try to find existing release for this tag if creation failed
              const { data: currentReleases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              return currentReleases[0]?.id;
            }

      - name: Upload APK to Release
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const release_id = '${{ steps.create_release.outputs.result }}';
            if (!release_id) return;
            
            const apkPath = 'android/app-release-signed.apk';
            if (fs.existsSync(apkPath)) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release_id,
                name: 'GlacierGoals.apk',
                data: fs.readFileSync(apkPath)
              });
            }
