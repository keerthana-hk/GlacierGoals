runtime: python310
entrypoint: gunicorn -b :$PORT app:app

env_variables:
  # Values can be overridden in GCP Console secret manager
  SECRET_KEY: "change_me_in_production"
  GROQ_API_KEY: "your_groq_api_key_here"
  # DATABASE_URL: "postgresql://user:password@host:port/dbname"

handlers:
- url: /static
  static_dir: static
  secure: always

- url: /.*
  script: auto
  secure: always

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 2
